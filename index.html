<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjetas de Producto</title>

    <!-- Conexion con CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1>Tienda Minimalista</h1>

    <section class="contenedor-tarjetas">

        <!-- TARJETA 1 -->
        <div class="tarjeta">
            <img src="img/download.jfif" alt="Botellas cosméticas minimalistas">

            <h2>Botellas Minimalistas</h2>

            <p>
                Set de envases cosméticos con diseño elegante y acabado moderno.
            </p>

            <span class="precio">$120.000</span>

            <button>Comprar</button>
        </div>

        <!-- TARJETA 2 -->
        <div class="tarjeta">
            <img src="img/images (1).jfif" alt="Aceite natural para el cuidado facial">

            <h2>Aceite Natural</h2>

            <p>
                Suero facial hidratante elaborado con ingredientes naturales.
            </p>

            <span class="precio">$250.000</span>

            <button>Comprar</button>
        </div>

        <!-- TARJETA 3 -->
        <div class="tarjeta">
            <img src="img/images.jfif" alt="Helado artesanal en cono">

            <h2>Helado Artesanal</h2>

            <p>
                Helado artesanal con sabores frutales y toppings de chocolate.
            </p>

            <span class="precio">$180.000</span>

            <button>Comprar</button>
        </div>

    </section>

</body>
</html>
